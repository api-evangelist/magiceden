description: >-
  Magic Eden is a multi-chain NFT marketplace and trading platform supporting Solana, Bitcoin
  (Ordinals and Runes), Ethereum, and Polygon. It provides REST APIs for accessing NFT listings,
  collection statistics, wallet activities, offers, and token metadata across supported chains, as
  well as trading instruction endpoints to generate and submit buy, sell, bid, and cancel orders
  directly on the Magic Eden marketplace. The Solana API also exposes Automated Market Maker (AMM/MMM)
  pool endpoints for liquidity provision. The Bitcoin Ordinals API covers inscriptions, rare sats,
  and the Runes protocol. Magic Eden has announced deprecation of its Bitcoin and EVM APIs; the
  Solana API remains the primary supported surface as of mid-2026.
