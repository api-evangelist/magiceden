apis:
  - aid: magiceden:magiceden-solana-collections-api
    name: Magic Eden Solana Collections API
    tags:
      - NFT
      - Collections
      - Solana
      - Marketplace
    humanURL: https://docs.magiceden.io/reference/solana-overview
    baseURL: https://api-mainnet.magiceden.dev
    properties:
      - url: https://docs.magiceden.io/reference/solana-overview
        type: Documentation
      - url: https://docs.magiceden.io/reference/solana-overview
        type: APIReference
      - url: openapi/magiceden-openapi.yaml
        type: OpenAPI
    description: >-
      Collection data endpoints for the Magic Eden Solana NFT marketplace. Provides access to
      collection listings, collection statistics, collection attributes, collection activities,
      holder statistics, leaderboard rankings by volume, batch listings, popular collections by
      time range, and launchpad collections. Supports filtering and pagination across all
      Solana NFT collections indexed by Magic Eden.

  - aid: magiceden:magiceden-solana-tokens-api
    name: Magic Eden Solana Tokens API
    tags:
      - NFT
      - Tokens
      - Metadata
      - Solana
      - Marketplace
    humanURL: https://docs.magiceden.io/reference/solana-overview
    baseURL: https://api-mainnet.magiceden.dev
    properties:
      - url: https://docs.magiceden.io/reference/solana-overview
        type: Documentation
      - url: https://docs.magiceden.io/reference/solana-overview
        type: APIReference
    description: >-
      Token and NFT data endpoints for the Magic Eden Solana marketplace. Provides token metadata
      retrieval by mint address, token activity history, token listings, received offers on a
      token, and general token lookup filterable by collection, owner, or token IDs. Enables
      developers to build NFT discovery, valuation, and trading surfaces on Solana.

  - aid: magiceden:magiceden-solana-wallets-api
    name: Magic Eden Solana Wallets API
    tags:
      - Wallets
      - Portfolio
      - Offers
      - Solana
      - Marketplace
    humanURL: https://docs.magiceden.io/reference/solana-overview
    baseURL: https://api-mainnet.magiceden.dev
    properties:
      - url: https://docs.magiceden.io/reference/solana-overview
        type: Documentation
      - url: https://docs.magiceden.io/reference/solana-overview
        type: APIReference
    description: >-
      Wallet-oriented endpoints for the Magic Eden Solana marketplace. Covers wallet information,
      wallet activity history, ownership activity, escrow balance, offers made and received by a
      wallet, tokens owned by a wallet, and NFT activity for a given user. Powers portfolio views,
      offer management, and activity feeds for Solana NFT holders.

  - aid: magiceden:magiceden-solana-trading-api
    name: Magic Eden Solana Trading Instructions API
    tags:
      - Trading
      - Buy
      - Sell
      - Bid
      - Escrow
      - Solana
      - Marketplace
    humanURL: https://docs.magiceden.io/reference/solana-overview
    baseURL: https://api-mainnet.magiceden.dev
    properties:
      - url: https://docs.magiceden.io/reference/solana-overview
        type: Documentation
      - url: https://docs.magiceden.io/reference/solana-overview
        type: APIReference
    description: >-
      Trading instruction endpoints for the Magic Eden Solana marketplace. Generates unsigned
      transaction instructions for buy now, bid/offer, list/sell, cancel buy, cancel sell, change
      buy price, change sell price, accept offer, escrow deposit, and escrow withdrawal operations.
      Clients sign and submit the returned transaction bytes to the Solana network. Enables
      fully programmable NFT trading on Magic Eden's Solana marketplace.

  - aid: magiceden:magiceden-solana-amm-api
    name: Magic Eden Solana AMM Pool API
    tags:
      - AMM
      - MMM
      - Liquidity
      - Pools
      - Solana
      - Marketplace
    humanURL: https://docs.magiceden.io/reference/solana-overview
    baseURL: https://api-mainnet.magiceden.dev
    properties:
      - url: https://docs.magiceden.io/reference/solana-overview
        type: Documentation
      - url: https://docs.magiceden.io/reference/solana-overview
        type: APIReference
    description: >-
      Automated Market Maker (AMM/MMM) pool endpoints for the Magic Eden Solana marketplace.
      Supports creating, closing, updating, and depositing/withdrawing SOL from liquidity pools.
      Provides endpoints for fulfilling buy and sell orders against pools, querying AMM pools by
      owner or collection, and retrieving best pool offers for specific NFTs. Enables market-making
      and algorithmic trading strategies on Solana NFT collections.

  - aid: magiceden:magiceden-ordinals-api
    name: Magic Eden Bitcoin Ordinals API
    tags:
      - Bitcoin
      - Ordinals
      - Inscriptions
      - Rare Sats
      - Marketplace
    humanURL: https://docs.magiceden.io/reference/ordinals-overview
    baseURL: https://api-mainnet.magiceden.dev
    properties:
      - url: https://docs.magiceden.io/reference/ordinals-overview
        type: Documentation
      - url: https://docs.magiceden.io/reference/ordinals-overview
        type: APIReference
    description: >-
      Bitcoin Ordinals and inscription endpoints for the Magic Eden marketplace. Covers block
      activity, collection statistics, collection search and retrieval, and inscription-level
      marketplace data. Also supports rare sats listings, rare sats by wallet address, batch
      listing PSBTs, and rare sat listing submission. Note: Magic Eden has announced end-of-life
      for its Bitcoin API services effective March 27, 2026; existing integrations should plan
      migration accordingly.

  - aid: magiceden:magiceden-runes-api
    name: Magic Eden Runes API
    tags:
      - Bitcoin
      - Runes
      - Trading
      - Marketplace
    humanURL: https://docs.magiceden.io/reference/ordinals-overview
    baseURL: https://api-mainnet.magiceden.dev
    properties:
      - url: https://docs.magiceden.io/reference/ordinals-overview
        type: Documentation
      - url: https://docs.magiceden.io/reference/ordinals-overview
        type: APIReference
    description: >-
      Runes protocol trading endpoints for the Magic Eden Bitcoin marketplace. Provides rune
      activity, collection stats, market information, rune orders, UTXOs by wallet, and wallet
      activities and balances. Trading operations include create and cancel rune sell orders,
      execute market orders, swap runes, get rune quotes, and bulk rune sweeping (buy). Note:
      Magic Eden has announced end-of-life for its Bitcoin API services effective March 27, 2026;
      existing integrations should plan migration accordingly.

